name: Module - Build & Test
on: workflow_call

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: if [ -f go.mod ]; then go build -v ./...; else echo "No go.mod, skipping"; fi
      - name: Run tests with coverage
        run: |
          if [ -f go.mod ]; then
            # Skip non-testable/generated entry points that can fail coverage tooling on some runners.
            go list ./... \
              | grep -v '/cmd/api$' \
              | grep -v '/internal/grpc/aegis/v1$' \
              | grep -v '/internal/grpc/aegis/v2$' \
              | xargs go test -v -coverprofile=coverage.out -coverpkg=./...
            # Filter out generated and mock files from the global threshold check.
            grep -v ".pb.go" coverage.out | grep -v "_mock.go" | grep -v "cmd/api" | grep -v "internal/grpc/aegis" > coverage_filtered.out
            COVERAGE=$(go tool cover -func=coverage_filtered.out | grep "^total:" | awk '{print $NF}' | sed 's/%//')
            echo "Filtered coverage: $COVERAGE%"
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "❌ Filtered coverage is below 80%!"
              exit 1
            fi
          else
            echo "No go.mod, skipping"
          fi
